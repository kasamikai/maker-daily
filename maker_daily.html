<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>自造教育日報 Maker Daily</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700;900&family=Noto+Sans+TC:wght@300;400;500&family=DM+Serif+Display&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --ink: #1a1a1a;
    --paper: #f5f7f2;
    --header-bg: #1a472a;
    --accent: #2d8a4e;
    --accent-light: #4caf70;
    --muted: #6b7280;
    --rule: #dde8d8;
    --sidebar-bg: #eef2eb;
    --card-active: #1a472a;
  }

  body {
    background: var(--paper);
    color: var(--ink);
    font-family: 'Noto Sans TC', sans-serif;
    font-weight: 300;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ── HEADER ── */
  header {
    background: var(--header-bg);
    color: #fff;
    padding: 0 2rem;
    flex-shrink: 0;
  }

  .header-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 1.8rem 0 1.4rem;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 1rem;
    flex-wrap: wrap;
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }

  .masthead {
    font-family: 'DM Serif Display', 'Noto Serif TC', serif;
    font-size: clamp(1.6rem, 4vw, 2.4rem);
    letter-spacing: -0.02em;
    line-height: 1;
  }

  .masthead-sub {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.5);
    margin-top: 0.3rem;
    letter-spacing: 0.1em;
  }

  .masthead span { color: var(--accent-light); }

  .header-meta { text-align: right; }

  .header-date {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.45);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }

  .header-tagline {
    font-size: 0.68rem;
    color: rgba(255,255,255,0.25);
    margin-top: 0.2rem;
  }

  /* ── 類別列 ── */
  .category-bar {
    background: #143d22;
    border-bottom: 1px solid rgba(255,255,255,0.05);
  }

  .category-bar-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 2rem;
    display: flex;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .category-bar-inner::-webkit-scrollbar { display: none; }

  .cat-btn {
    padding: 0.75rem 1.1rem;
    font-size: 0.78rem;
    font-family: 'Noto Sans TC', sans-serif;
    color: rgba(255,255,255,0.4);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    letter-spacing: 0.03em;
  }

  .cat-btn:hover { color: rgba(255,255,255,0.8); }

  .cat-btn.active {
    color: #fff;
    border-bottom-color: var(--accent-light);
  }

  /* ── LAYOUT ── */
  .layout {
    display: flex;
    flex: 1;
    max-width: 1200px;
    margin: 0 auto;
    width: 100%;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 240px;
    flex-shrink: 0;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--rule);
    padding: 1.5rem 1rem;
    overflow-y: auto;
    max-height: calc(100vh - 130px);
    position: sticky;
    top: 0;
  }

  .sidebar-label {
    font-size: 0.63rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    border-top: 2px solid var(--ink);
    padding-top: 0.4rem;
    margin-bottom: 1rem;
  }

  .date-card {
    background: #fff;
    border: 1px solid var(--rule);
    border-radius: 6px;
    padding: 0.8rem 0.9rem;
    margin-bottom: 0.5rem;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .date-card:hover { border-color: #aac8a7; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }

  .date-card.active {
    background: var(--card-active);
    border-color: var(--card-active);
  }

  .date-card-accent {
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent-light);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .date-card.active .date-card-accent { opacity: 1; }

  .date-card-date {
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--ink);
    margin-bottom: 0.2rem;
  }

  .date-card.active .date-card-date { color: #fff; }

  .date-card-count {
    font-size: 0.62rem;
    color: var(--muted);
  }

  .date-card.active .date-card-count { color: rgba(255,255,255,0.4); }

  /* ── CONTENT ── */
  .content {
    flex: 1;
    padding: 2rem 2.5rem 4rem;
    min-width: 0;
  }

  .content-header {
    margin-bottom: 1.8rem;
    padding-bottom: 1rem;
    border-bottom: 1px solid var(--rule);
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 0.5rem;
  }

  .content-title {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.2rem, 3vw, 1.7rem);
  }

  .content-subtitle {
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .section-label {
    font-size: 0.63rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--muted);
    border-top: 2px solid var(--ink);
    padding-top: 0.4rem;
    margin-bottom: 1.5rem;
  }

  /* ── NEWS CARDS ── */
  .news-list { display: flex; flex-direction: column; }

  .news-card {
    display: grid;
    grid-template-columns: 3rem 1fr;
    gap: 0 1.5rem;
    padding: 1.4rem 0;
    border-bottom: 1px solid var(--rule);
    transition: background 0.12s;
  }

  .news-card:hover {
    background: rgba(0,0,0,0.02);
    margin: 0 -0.8rem;
    padding-left: 0.8rem;
    padding-right: 0.8rem;
    border-radius: 4px;
  }

  .rank-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding-top: 0.1rem;
  }

  .rank-num {
    font-family: 'DM Serif Display', serif;
    font-size: 1.4rem;
    line-height: 1;
    margin-bottom: 0.4rem;
    color: var(--accent);
  }

  .rank-bar {
    width: 3px;
    flex: 1;
    min-height: 32px;
    border-radius: 2px;
    background: var(--accent);
    opacity: 0.15;
  }

  .news-source {
    font-size: 0.6rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 0.25rem;
  }

  .news-title {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(0.95rem, 2vw, 1.08rem);
    font-weight: 700;
    line-height: 1.5;
    margin-bottom: 0.4rem;
  }

  .news-title a {
    color: inherit;
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }

  .news-title a:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  .news-title a::after {
    content: ' ↗';
    font-size: 0.72em;
    opacity: 0;
    transition: opacity 0.15s;
    font-family: sans-serif;
    font-weight: 300;
  }

  .news-title a:hover::after { opacity: 1; }

  .news-desc {
    font-size: 0.84rem;
    color: #555;
    line-height: 1.75;
  }

  /* 語言標籤 */
  .lang-tag {
    display: inline-block;
    font-size: 0.58rem;
    padding: 0.1rem 0.4rem;
    border-radius: 3px;
    margin-left: 0.4rem;
    vertical-align: middle;
    font-weight: 500;
    letter-spacing: 0.05em;
  }

  .lang-tw { background: #e8f4ea; color: #1a472a; }
  .lang-en { background: #e8eef8; color: #1a3a6b; }

  /* ── STATE ── */
  .state-msg {
    text-align: center;
    padding: 4rem 2rem;
    color: var(--muted);
    font-size: 0.9rem;
  }

  .state-msg strong {
    display: block;
    font-size: 1.1rem;
    color: var(--ink);
    margin-bottom: 0.5rem;
  }

  footer {
    text-align: center;
    padding: 1rem;
    font-size: 0.68rem;
    color: var(--muted);
    border-top: 1px solid var(--rule);
    background: var(--sidebar-bg);
  }

  @media (max-width: 680px) {
    .layout { flex-direction: column; }
    .sidebar {
      width: 100%;
      max-height: none;
      position: static;
      display: flex;
      gap: 0.5rem;
      overflow-x: auto;
      padding: 0.8rem;
      border-right: none;
      border-bottom: 1px solid var(--rule);
    }
    .sidebar-label { display: none; }
    .date-card { min-width: 120px; margin-bottom: 0; flex-shrink: 0; }
    .content { padding: 1.2rem 1rem 3rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="masthead">自造教育日報<span>.</span></div>
      <div class="masthead-sub">Maker Education Daily Brief</div>
    </div>
    <div class="header-meta">
      <div class="header-date" id="headerDate">載入中</div>
      <div class="header-tagline">Top 10 · 中英文並重</div>
    </div>
  </div>
</header>

<div class="category-bar">
  <div class="category-bar-inner">
    <button class="cat-btn active" onclick="selectCategory('自造教育')">🔨 自造教育</button>
    <button class="cat-btn" onclick="selectCategory('創客Makerspace')">🏭 創客Makerspace</button>
    <button class="cat-btn" onclick="selectCategory('STEAM教育')">🔬 STEAM教育</button>
    <button class="cat-btn" onclick="selectCategory('程式教育')">💻 程式教育</button>
    <button class="cat-btn" onclick="selectCategory('科技教育')">📡 科技教育</button>
    <button class="cat-btn" onclick="selectCategory('CNC製造')">⚙️ CNC製造</button>
  </div>
</div>

<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-label">歷史日期</div>
    <div id="dateList"><div style="font-size:0.8rem;color:var(--muted);padding:0.5rem 0;">載入中⋯</div></div>
  </aside>
  <main class="content">
    <div id="newsContent">
      <div class="state-msg"><strong>載入中⋯</strong>正在讀取今日自造教育新聞</div>
    </div>
  </main>
</div>

<footer>自造教育日報 · 資料來源：Google News · 中英文並重 · 每天早上 8 點自動更新</footer>

<script>
  const SHEET_ID = '1HbuqwPaINN3L53l8HGXHJ7Q8IHXNhFoyHDT2qaKQ_as';

  const CATEGORY_ICONS = {
    '自造教育':'🔨','創客Makerspace':'🏭','STEAM教育':'🔬',
    '程式教育':'💻','科技教育':'📡','CNC製造':'⚙️'
  };

  function escHtml(str) {
    return (str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function isEnglish(text) {
    const engChars = (text.match(/[a-zA-Z]/g) || []).length;
    return engChars / text.length > 0.5;
  }

  let indexData = [];
  let cache = {};
  let activeDate = null;
  let activeCategory = '自造教育';

  async function fetchSheet(sheetName) {
    const encoded = encodeURIComponent(sheetName);
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encoded}`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('無法讀取：' + sheetName);
    return res.text();
  }

  function parseCSV(text) {
    const lines = text.trim().split('\n').slice(1);
    return lines.map(line => {
      const cols = [];
      let cur = '', inQ = false;
      for (const ch of line) {
        if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
        else { cur += ch; }
      }
      cols.push(cur.trim());
      return {
        rank: parseInt(cols[1]) || 0,
        title: cols[2] || '',
        description: cols[3] || '',
        source: cols[4] || '',
        link: cols[5] || ''
      };
    }).filter(i => i.title);
  }

  function renderSidebar() {
    const container = document.getElementById('dateList');
    const available = indexData.filter(d => d.categories.includes(activeCategory));
    if (available.length === 0) {
      container.innerHTML = '<div style="font-size:0.78rem;color:var(--muted);padding:0.5rem 0;">此類別暫無資料</div>';
      return;
    }
    container.innerHTML = available.map(({ date }) => {
      const isActive = date === activeDate;
      return `
        <div class="date-card ${isActive ? 'active' : ''}" onclick="selectDate('${date}')">
          <div class="date-card-accent"></div>
          <div class="date-card-date">${date}</div>
          <div class="date-card-count">${CATEGORY_ICONS[activeCategory]||''} ${activeCategory}</div>
        </div>`;
    }).join('');
  }

  function renderNews(items) {
    document.getElementById('headerDate').textContent = activeDate + ' · ' + activeCategory;
    if (!items || items.length === 0) {
      document.getElementById('newsContent').innerHTML =
        `<div class="state-msg"><strong>暫無資料</strong>此日期尚無${activeCategory}記錄</div>`;
      return;
    }
    const icon = CATEGORY_ICONS[activeCategory] || '';
    document.getElementById('newsContent').innerHTML = `
      <div class="content-header">
        <div class="content-title">${activeDate}</div>
        <div class="content-subtitle">${icon} ${activeCategory} · 前 ${items.length} 則</div>
      </div>
      <div class="section-label">今日精選報導 · 點擊標題查看原始新聞</div>
      <div class="news-list">
        ${items.map((item, i) => {
          const eng = isEnglish(item.title);
          const langTag = eng
            ? '<span class="lang-tag lang-en">EN</span>'
            : '<span class="lang-tag lang-tw">中</span>';
          const titleContent = item.link
            ? `<a href="${escHtml(item.link)}" target="_blank" rel="noopener">${escHtml(item.title)}</a>${langTag}`
            : `${escHtml(item.title)}${langTag}`;
          return `
            <article class="news-card">
              <div class="rank-col">
                <div class="rank-num">${item.rank}</div>
                <div class="rank-bar"></div>
              </div>
              <div>
                <div class="news-source">${escHtml(item.source)}</div>
                <div class="news-title">${titleContent}</div>
                <div class="news-desc">${escHtml(item.description)}</div>
              </div>
            </article>`;
        }).join('')}
      </div>`;
  }

  async function loadAndShow(date, category) {
    if (!cache[date]) cache[date] = {};
    if (!cache[date][category]) {
      document.getElementById('newsContent').innerHTML =
        '<div class="state-msg"><strong>載入中⋯</strong></div>';
      try {
        const csv = await fetchSheet(date + '_' + category);
        cache[date][category] = parseCSV(csv);
      } catch(e) {
        cache[date][category] = [];
      }
    }
    renderNews(cache[date][category]);
  }

  async function selectDate(date) {
    activeDate = date;
    renderSidebar();
    await loadAndShow(date, activeCategory);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  async function selectCategory(category) {
    activeCategory = category;
    document.querySelectorAll('.cat-btn').forEach(btn => {
      btn.classList.toggle('active', btn.textContent.includes(
        category.replace('創客Makerspace','創客').replace('STEAM教育','STEAM')
          .replace('程式教育','程式').replace('科技教育','科技').replace('CNC製造','CNC')
      ));
    });
    const available = indexData.filter(d => d.categories.includes(category));
    activeDate = available.length > 0 ? available[0].date : null;
    renderSidebar();
    if (activeDate) {
      await loadAndShow(activeDate, activeCategory);
    } else {
      document.getElementById('newsContent').innerHTML =
        `<div class="state-msg"><strong>暫無資料</strong>此類別尚無新聞記錄</div>`;
    }
  }

  async function init() {
    try {
      const indexCSV = await fetchSheet('_index');
      const lines = indexCSV.trim().split('\n').slice(1);
      const dateMap = {};
      lines.forEach(line => {
        const cols = line.replace(/"/g, '').split(',');
        const date = (cols[0]||'').trim();
        const cat = (cols[1]||'').trim();
        if (!date || !cat) return;
        if (!dateMap[date]) dateMap[date] = [];
        if (!dateMap[date].includes(cat)) dateMap[date].push(cat);
      });

      indexData = Object.keys(dateMap).sort().reverse()
        .map(date => ({ date, categories: dateMap[date] }));

      if (indexData.length === 0) throw new Error('尚無新聞資料');

      const first = indexData.find(d => d.categories.includes('自造教育'));
      activeDate = first ? first.date : indexData[0].date;
      if (!first) activeCategory = indexData[0].categories[0];

      renderSidebar();
      await loadAndShow(activeDate, activeCategory);

    } catch(err) {
      document.getElementById('dateList').innerHTML =
        `<div style="font-size:0.75rem;color:#c00;padding:0.5rem 0;">${err.message}</div>`;
      document.getElementById('newsContent').innerHTML =
        `<div class="state-msg"><strong>載入失敗</strong>${err.message}</div>`;
    }
  }

  init();
</script>
</body>
</html>
